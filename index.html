<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电子女友聊天</title>
<style>
body { font-family: sans-serif; background:#f0f0f0; display:flex; flex-direction:column; align-items:center; padding:10px; }
#chat { width:100%; max-width:500px; min-height:400px; background:#fff; border-radius:10px; padding:10px; overflow-y:auto; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:10px; }
.msg { margin:8px 0; padding:10px; border-radius:10px; max-width:80%; word-wrap:break-word; }
.user { background:#9fe6a0; align-self:flex-end; text-align:right; }
.bot { background:#eee; align-self:flex-start; }
#inputContainer { width:100%; max-width:500px; display:flex; gap:5px; }
#input { flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; font-size:16px; }
button { padding:10px 15px; border-radius:8px; border:none; background:#4CAF50; color:white; font-size:16px; cursor:pointer; }
button:hover { background:#45a049; }
</style>
</head>
<body>

<h2>电子女友聊天</h2>
<div id="chat"></div>

<div id="inputContainer">
    <input id="input" placeholder="输入你的消息..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">发送</button>
</div>

<script>
async function send(){
    let text = input.value.trim();
    if(!text) return;
    add(text, "user");
    
    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        let data = await res.json();
        add(data.reply, "bot");
    } catch(err) {
        add("网络或服务器错误，请稍后再试", "bot");
        console.error(err);
    }

    input.value = "";
}

function add(t,c){
    let d = document.createElement("div");
    d.className = "msg " + c;
    d.innerText = t;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

// 页面加载时拉取历史聊天
window.onload = async function(){
    try {
        // 调用 /chat-history 接口可以扩展，这里暂不做，直接前端只显示新消息
        // 永久记录由后端数据库维护
    } catch(e){
        console.error(e);
    }
}
</script>

</body>
</html>
